# acx-pr-reminders-org.yml (PRG-07) -- ORG-WIDE PR reminders.
#
# This is the CENTRAL scheduled workflow. It belongs in withACX/.github at
#   .github/workflows/acx-pr-reminders-org.yml
# and gives EVERY withACX repo the same two PR reminders as the per-repo
# workflows (acx-pr-ready-reminder.yml, acx-pr-reviewer-reminder.yml), with NO
# per-repo install. The per-repo workflows remain a fallback for repos not yet
# covered or wanting event-driven immediacy; this central sweep is the default
# org-wide coverage (ADR-0081, PRG-07).
#
# It polls instead of reacting to events: on a schedule it enumerates all
# withACX repos and their open PRs and applies BOTH reminder behaviors to each.
#
# TOKEN DEPENDENCY: the built-in GITHUB_TOKEN only reaches this workflow's own
# repo (withACX/.github). Cross-repo read + comment needs an org-scoped token in
# the secret ORG_PR_REMINDER_TOKEN -- a fine-grained PAT (or GitHub App
# installation token) with Contents: Read and Pull requests: Read and write
# across withACX repos. See knowledge/token-registry.md (ORG_PR_REMINDER_TOKEN)
# in a-cx-ai-config. Until that secret is provisioned the workflow is inert: it
# logs a notice and exits 0 (it does NOT fail the scheduled run).
#
# Delivery still depends on each person's GitHub notification settings and a
# verified A-CX profile email -- the reminder is a comment that @-mentions the
# PR author and GitHub emails them; no SMTP/secrets. See
# docs/github-notification-settings.md in a-cx-ai-config.
name: acx PR reminders (org-wide)

on:
  schedule:
    # Every 2 hours. A polling sweep, so cadence is a latency/API-volume
    # trade-off: 2h keeps reminders reasonably fresh without hammering the API
    # or the org's Actions minutes. workflow_dispatch allows an on-demand run.
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

# No permissions for THIS workflow's own GITHUB_TOKEN: it is never used. There is
# no checkout and no default-token API call -- ALL access goes through
# ORG_PR_REMINDER_TOKEN (passed explicitly to github-script). Strictly least
# privilege.
permissions: {}

# One sweep at a time: overlapping scheduled runs would double-post while both
# see the same not-yet-created comment.
concurrency:
  group: acx-pr-reminders-org
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      # No checkout: the script is inline (the shared upsert helper is
      # context.repo-bound and cannot be reused cross-repo, so equivalent
      # owner/repo-parameterized helpers are inlined below).
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.ORG_PR_REMINDER_TOKEN }}
          script: |
            // Inert until the org-scoped token is provisioned. github-script
            // always supplies a client, but without ORG_PR_REMINDER_TOKEN it is
            // built from the workflow's own GITHUB_TOKEN, which cannot reach
            // other withACX repos. Detect the empty secret and exit cleanly.
            const token = process.env.ORG_PR_REMINDER_TOKEN || "";
            if (!token) {
              core.info(
                "ORG_PR_REMINDER_TOKEN not set -- org-wide PR reminders are inert. " +
                "Provision a fine-grained PAT (Contents: Read, Pull requests: Read " +
                "and write across withACX repos) as the ORG_PR_REMINDER_TOKEN secret " +
                "in withACX/.github. See knowledge/token-registry.md in a-cx-ai-config."
              );
              return;  // exit 0 -- do NOT fail the scheduled run
            }

            const ORG = "withACX";
            const READY_MARKER = "<!-- acx:pr-ready -->";
            const REVIEWER_MARKER = "<!-- acx:needs-reviewer -->";

            // --- cross-repo-aware marker-comment helpers -----------------
            // Parameterized by {owner, repo} instead of context.repo, so the
            // same run can act on any withACX repo. Behavior mirrors the shared
            // acx-upsert-marker-comment.js (find-by-marker, upsert, remove).
            async function findMarkerComment({ owner, repo, prNumber, marker }) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: prNumber, per_page: 100,
              });
              return comments.find((c) => (c.body || "").includes(marker));
            }
            async function upsert({ owner, repo, prNumber, marker, body }) {
              if (!marker || !body || !body.includes(marker)) {
                throw new Error("upsert: body must be non-empty and contain the marker");
              }
              const existing = await findMarkerComment({ owner, repo, prNumber, marker });
              if (existing) {
                if ((existing.body || "") === body) return "unchanged";
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                return "updated";
              }
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              return "created";
            }
            async function remove({ owner, repo, prNumber, marker }) {
              const existing = await findMarkerComment({ owner, repo, prNumber, marker });
              if (!existing) return "absent";
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              return "removed";
            }

            // --- enumerate withACX repos ---------------------------------
            // type "all" covers public + private the token can see. Skip
            // archived (read-only) and disabled repos -- posting is pointless
            // or impossible there.
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: ORG, type: "all", per_page: 100,
            });
            const active = repos.filter((r) => !r.archived && !r.disabled);
            core.info(`Scanning ${active.length} active repos (of ${repos.length}) in ${ORG}.`);

            // Rate-limit note: this is O(repos * open_PRs) with a few calls per
            // PR (get, checks, combined status, comments, sometimes reviews).
            // A fine-grained PAT gets the standard 5000 req/hour; a 2-hour
            // cadence over the current org volume stays well under that. If the
            // org grows enough to approach the ceiling, lengthen the cron
            // interval or shard by repo -- correctness first, not cleverness.
            for (const repoInfo of active) {
              const owner = ORG;
              const repo = repoInfo.name;

              let prs;
              try {
                prs = await github.paginate(github.rest.pulls.list, {
                  owner, repo, state: "open", per_page: 100,
                });
              } catch (e) {
                core.warning(`${owner}/${repo}: could not list PRs (${e.status || e.message}); skipping repo.`);
                continue;
              }

              for (const prLite of prs) {
                const prNumber = prLite.number;
                try {
                  // Full PR object: pulls.list omits mergeable, so fetch it.
                  const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                  if (pr.state !== "open") continue;
                  if (!pr.user || !pr.user.login) {  // deleted/suspended author -> skip
                    core.info(`${owner}/${repo}#${prNumber}: skipped -- no author login`);
                    continue;
                  }

                  const hasReviewer =
                    (pr.requested_reviewers || []).length > 0 ||
                    (pr.requested_teams || []).length > 0;

                  // === (a) ready nudge: <!-- acx:pr-ready --> ===============
                  // "Green": every check run completed success/neutral/skipped
                  // AND combined commit status is success or empty (no
                  // failing/pending). No own-check-run to exclude here -- this
                  // workflow runs in withACX/.github, not on the PR head SHA.
                  const allChecks = await github.paginate(github.rest.checks.listForRef, {
                    owner, repo, ref: pr.head.sha, per_page: 100,
                  });
                  const okConclusions = ["success", "neutral", "skipped"];
                  const checksGreen = allChecks.every(
                    (c) => c.status === "completed" && okConclusions.includes(c.conclusion));
                  const combined = await github.rest.repos.getCombinedStatusForRef({
                    owner, repo, ref: pr.head.sha });
                  // No configured checks/statuses is treated as "not a blocker".
                  const statusGreen = ["success", ""].includes(combined.data.state) ||
                    combined.data.total_count === 0;
                  const green = checksGreen && statusGreen;

                  // mergeable is computed async; null == unknown -> not yet mergeable.
                  const mergeable = pr.mergeable === true;

                  if (green && mergeable && (pr.draft || !hasReviewer)) {
                    const reason = pr.draft
                      ? "still a **draft**"
                      : "open but has **no reviewer** assigned";
                    const body = [
                      READY_MARKER,
                      `@${pr.user.login} this PR passes checks and is mergeable but is ${reason}.`,
                      pr.draft
                        ? "Mark it ready for review (`gh pr ready`) and request an eligible reviewer."
                        : "Request an eligible reviewer so it can be reviewed.",
                    ].join("\n\n");
                    core.info(`${owner}/${repo}#${prNumber}: ready ${await upsert({ owner, repo, prNumber, marker: READY_MARKER, body })}`);
                  } else {
                    core.info(`${owner}/${repo}#${prNumber}: ready ${await remove({ owner, repo, prNumber, marker: READY_MARKER })} (green=${green} mergeable=${mergeable} draft=${pr.draft} hasReviewer=${hasReviewer})`);
                  }

                  // === (b) no-reviewer nudge: <!-- acx:needs-reviewer --> ===
                  // Non-draft AND no requested reviewer/team AND no submitted
                  // review -> upsert; else remove.
                  if (pr.draft) {
                    // Drafts are not ready for a reviewer -- clear any stale nag.
                    core.info(`${owner}/${repo}#${prNumber}: reviewer ${await remove({ owner, repo, prNumber, marker: REVIEWER_MARKER })} (draft)`);
                    continue;
                  }
                  let hasReview = false;
                  if (!hasReviewer) {
                    // A submitted review clears requested_reviewers, so a PR
                    // awaiting author changes is NOT reviewer-less.
                    const reviews = await github.paginate(github.rest.pulls.listReviews, {
                      owner, repo, pull_number: prNumber, per_page: 100,
                    });
                    hasReview = reviews.length > 0;
                  }
                  if (hasReviewer || hasReview) {
                    core.info(`${owner}/${repo}#${prNumber}: reviewer ${await remove({ owner, repo, prNumber, marker: REVIEWER_MARKER })} (has reviewer/review)`);
                  } else {
                    const body = [
                      REVIEWER_MARKER,
                      `@${pr.user.login} this open PR has **no reviewer** assigned.`,
                      "Request an eligible reviewer (a withACX member who is not the author) so it can be reviewed and merged.",
                    ].join("\n\n");
                    core.info(`${owner}/${repo}#${prNumber}: reviewer ${await upsert({ owner, repo, prNumber, marker: REVIEWER_MARKER, body })}`);
                  }
                } catch (e) {
                  // One bad PR must not abort the whole sweep.
                  core.warning(`${owner}/${repo}#${prNumber}: error (${e.status || e.message}); continuing.`);
                }
              }
            }
        env:
          ORG_PR_REMINDER_TOKEN: ${{ secrets.ORG_PR_REMINDER_TOKEN }}
