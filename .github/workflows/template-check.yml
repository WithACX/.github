name: Template-conformance check

# Server-side backstop for the "Issue Bodies Follow the Templates" rule
# (github skill SKILL.md). Issue forms only apply in the GitHub web UI;
# this workflow fires on every issue creation regardless of actor (gh CLI,
# API, Claude Code, Copilot, scripts) and flags non-conforming bodies.
#
# Required headings are DERIVED AT RUNTIME from the sibling
# .github/ISSUE_TEMPLATE/*.yml (the `label:` of each `required: true` field),
# so the check can never disagree with the templates it enforces -- there is
# no hardcoded heading map to drift.
#
# On mismatch: applies the `needs-template` marker label and posts a comment
# with a link to the matching template. Never auto-closes or auto-rewrites.
#
# Skips: issues from the Actions runner itself (avoids loops), types with no
# structured template (wontfix, blank issues), and repos with no templates.
#
# Distribute via the org-defaults path (withACX/.github, ADR-0055).

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  check-template:
    name: Check issue body against template headings
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out the repo (for its issue templates)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Evaluate conformance and flag if needed
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels) }}
          ISSUE_ACTOR: ${{ github.event.issue.user.login }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import glob, json, os, re, subprocess, sys

          repo = os.environ["REPO"]
          issue_num = os.environ["ISSUE_NUMBER"]
          body = os.environ.get("ISSUE_BODY", "") or ""
          labels_raw = os.environ.get("ISSUE_LABELS", "[]")
          actor = os.environ.get("ISSUE_ACTOR", "")

          # Skip the workflow's own bot to avoid infinite label loops.
          SKIP_ACTORS = {"github-actions[bot]", "dependabot[bot]"}
          if actor in SKIP_ACTORS:
              print(f"Actor {actor!r} is on the skip list. Nothing to do.")
              sys.exit(0)

          labels = [l["name"] for l in json.loads(labels_raw)]
          print(f"Issue #{issue_num} | actor={actor} | labels={labels}")

          # PyYAML is preinstalled on ubuntu-latest; install defensively if not.
          # If it is genuinely unavailable (e.g. an odd self-hosted runner), skip
          # rather than crash on every issue -- degraded but safe.
          try:
              import yaml
          except ImportError:
              subprocess.run(
                  [sys.executable, "-m", "pip", "install", "--quiet",
                   "--break-system-packages", "pyyaml==6.0.2"],
                  check=False,
              )
              try:
                  import yaml
              except ImportError:
                  print("PyYAML unavailable and could not be installed; "
                        "cannot read templates. Skipping template check.")
                  sys.exit(0)

          # Derive the type -> (required headings, template file, friendly name)
          # map at RUNTIME from the repo's own issue-form templates. The required
          # headings are the `label:` values of each `required: true` field; the
          # type is the template's first canonical type label; the friendly name
          # is the template's `name:`. No hardcoded map, so the enforcer can never
          # disagree with the templates it lives beside (#466).
          TYPE_LABELS = {"bug", "feature request", "documentation", "investigate"}
          template_map = {}
          for path in sorted(glob.glob(".github/ISSUE_TEMPLATE/*.yml")):
              if os.path.basename(path) == "config.yml":
                  continue
              # Guard the WHOLE per-file body: a template that is valid YAML but
              # the wrong shape (top-level list, scalar `labels:`, non-dict
              # `validations:`) must be skipped, never crash the check for every
              # future issue. isinstance guards + a broad except deliver that.
              try:
                  with open(path, encoding="utf-8") as fh:
                      data = yaml.safe_load(fh)
                  if not isinstance(data, dict):
                      continue
                  tmpl_labels = [str(x).lower() for x in (data.get("labels") or [])]
                  type_label = next((x for x in tmpl_labels if x in TYPE_LABELS), None)
                  if type_label is None:
                      continue
                  required = []
                  for field in data.get("body") or []:
                      if not isinstance(field, dict):
                          continue
                      validations = field.get("validations")
                      if isinstance(validations, dict) and validations.get("required") is True:
                          attributes = field.get("attributes")
                          heading = attributes.get("label") if isinstance(attributes, dict) else None
                          if heading:
                              required.append(str(heading).strip())
                  template_map[type_label] = (
                      required,
                      os.path.basename(path),
                      data.get("name") or type_label.title(),
                  )
              except Exception as exc:  # noqa: BLE001 -- a malformed template must not break the check
                  print(f"Skipping unparseable template {path}: {exc}")
                  continue

          if not template_map:
              print("No issue templates found under .github/ISSUE_TEMPLATE/. Skipping.")
              sys.exit(0)

          matched_type = None
          for label in labels:
              if label.lower() in template_map:
                  matched_type = label.lower()
                  break

          if matched_type is None:
              print(f"No structured template for labels {labels}. Skipping.")
              sys.exit(0)

          required_headings, template_file, type_name = template_map[matched_type]
          print(f"Type: {type_name} | Required headings: {required_headings}")

          # Check for required headings -- match ## or ### Heading (case-insensitive).
          # GitHub issue forms render labels as ### (H3) headings in the body;
          # manually crafted bodies may use ## (H2). Both are conforming.
          def has_heading(text: str, heading: str) -> bool:
              pattern = rf"^#{{2,3}}\s+{re.escape(heading)}\s*$"
              return bool(re.search(pattern, text, re.IGNORECASE | re.MULTILINE))

          # Feature-request label is also used for task sub-issues (A-CX has no
          # task type label). Accept the canonical task body shape as conforming
          # so Task sub-issues with ## Scope + ## Acceptance criteria are not
          # false-flagged as missing feature-request headings.
          if matched_type == "feature request":
              task_headings = ["Scope", "Acceptance criteria"]
              if all(has_heading(body, h) for h in task_headings):
                  print("Task sub-issue shape detected (Scope + Acceptance criteria). Conforms.")
                  sys.exit(0)

          missing = [h for h in required_headings if not has_heading(body, h)]

          if not missing:
              print("All required headings present. Issue conforms to template.")
              sys.exit(0)

          # Non-conforming: ensure the needs-template label exists, apply it,
          # and post a comment.
          print(f"Missing headings: {missing}")

          # Create label if absent (idempotent via --force).
          subprocess.run(
              ["gh", "label", "create", "needs-template",
               "--repo", repo,
               "--color", "E4E669",
               "--description", "Issue body does not follow the type template",
               "--force"],
              capture_output=True,
          )

          subprocess.run(
              ["gh", "issue", "edit", issue_num, "--repo", repo,
               "--add-label", "needs-template"],
              capture_output=True,
          )

          owner, name = repo.split("/")
          template_url = (
              f"https://github.com/{owner}/{name}/blob/main/"
              f".github/ISSUE_TEMPLATE/{template_file}"
          )
          missing_list = "\n".join(f"- `## {h}`" for h in missing)
          comment = (
              f"**Template check:** this {type_name.lower()} issue is missing "
              f"the following section heading(s):\n\n"
              f"{missing_list}\n\n"
              f"Please restructure the body to match the "
              f"[{type_name} template]({template_url}). "
              f"The `needs-template` label has been applied so this is "
              f"queryable. Remove it once the body is updated."
          )

          subprocess.run(
              ["gh", "issue", "comment", issue_num, "--repo", repo,
               "--body", comment],
              capture_output=True,
          )

          print(f"Issue #{issue_num}: labeled needs-template and commented.")
          PYEOF
